<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docrys & DC — Plan Digital 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Poppins,system-ui,sans-serif;background:#f5f0e8;color:#1a1205;min-height:100vh}

/* ── HEADER ── */
.hdr{background:#0d0d0d;padding:14px 16px 0;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.hdr-brand{display:flex;flex-direction:column}
.hdr-eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#c9a84c;font-weight:700;margin-bottom:2px}
.hdr-title{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.02em;line-height:1.2}
.hdr-stats{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.stat{text-align:center;min-width:36px}
.stat-n{font-size:17px;font-weight:700;line-height:1}
.stat-l{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:2px}
.save-badge{font-size:10px;padding:3px 8px;border-radius:10px;letter-spacing:.06em;background:rgba(255,255,255,.08)}
.pts-badge{display:flex;align-items:center;gap:5px;background:rgba(255,110,180,.12);border:1.5px solid #ff6eb4;padding:4px 10px;border-radius:20px}
.pts-n{font-size:15px;font-weight:800;color:#ff6eb4;line-height:1}
.pts-l{font-size:9px;font-weight:700;color:rgba(255,110,180,.7);letter-spacing:.1em;text-transform:uppercase}

/* ── SECTION SWITCHER ── */
.section-switcher{display:flex;gap:6px;padding:10px 0 0;overflow-x:auto;scrollbar-width:none}
.section-switcher::-webkit-scrollbar{display:none}
.sec-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border:1.5px solid rgba(255,255,255,.12);border-radius:8px 8px 0 0;background:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);transition:all .2s;white-space:nowrap;border-bottom:none}
.sec-btn:hover{color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.25)}
.sec-btn.on{background:#f5f0e8;color:#1a1205;border-color:#c9a84c;border-bottom-color:#f5f0e8}
.sec-btn.on.seo{background:#f5f0e8;color:#1a4a48}
.sec-btn.on.pub{background:#f5f0e8;color:#3a0066}
.sec-icon{font-size:14px}

/* ── MONTH TABS ── */
.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;background:#0d0d0d;padding:0 0 0}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 13px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.on{color:#c9a84c;border-bottom-color:#c9a84c}
.tab.on.seo-tab{color:#2c8e8a;border-bottom-color:#2c8e8a}
.tab.on.pub-tab{color:#a855f7;border-bottom-color:#a855f7}

.prog{height:3px;background:rgba(0,0,0,.1)}
.prog-bar{height:3px;transition:width .4s}
.prog-bar.rrss{background:linear-gradient(90deg,#c9a84c,#f0c96a)}
.prog-bar.seo{background:linear-gradient(90deg,#2c8e8a,#4fd1cd)}
.prog-bar.pub{background:linear-gradient(90deg,#a855f7,#d8b4fe)}

/* ── BODY ── */
.body{padding:16px;max-width:900px;margin:0 auto}
.mth-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.mth-accent{width:4px;height:28px;border-radius:2px;flex-shrink:0}
.mth-accent.rrss{background:#c9a84c}
.mth-accent.seo{background:#2c8e8a}
.mth-accent.pub{background:#a855f7}
.mth-name{font-size:18px;font-weight:700;color:#0d0d0d;letter-spacing:-.02em}
.mth-sub{font-size:11px;color:#6b5f4e;letter-spacing:.06em;margin-top:1px}

/* ── WEEK (RRSS) ── */
.week{border:1px solid rgba(201,168,76,.3);border-radius:10px;overflow:hidden;background:#fff;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.week-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;border:none;background:none;width:100%;font-family:inherit;gap:10px;transition:background .2s}
.week-hdr:hover{background:#f5f0e8}
.week-hdr.on{background:#0d0d0d}
.wk-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wk-label{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#1a1205}
.week-hdr.on .wk-label{color:#fff}
.wk-badges{display:flex;gap:4px;flex-wrap:wrap}
.wbadge{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700;letter-spacing:.06em}
.wbadge.apr{background:#f0fdf4;color:#166534}
.wbadge.rev{background:#fffbeb;color:#92400e}
.wbadge.tot{background:#f5f0e8;color:#6b5f4e}
.week-hdr.on .wbadge.tot{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4)}
.wk-arrow{font-size:11px;color:#6b5f4e;transition:transform .25s;flex-shrink:0}
.week-hdr.on .wk-arrow{color:rgba(255,255,255,.4);transform:rotate(180deg)}
.week-body{padding:14px}
.plat-hdr{display:flex;align-items:center;gap:6px;padding-bottom:10px;margin-bottom:12px;border-bottom:2px solid #c9a84c}
.plat-name{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#8b6914}
.plat-count{font-size:10px;color:#6b5f4e;margin-left:auto;letter-spacing:.06em}
.posts-grid{display:flex;flex-direction:column;gap:12px}

/* ── CARD (shared) ── */
.card{background:#fafaf8;border:1px solid rgba(201,168,76,.2);border-radius:10px;border-left:4px solid #ccc;padding:13px 14px;display:flex;flex-direction:column;gap:10px;transition:box-shadow .2s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.card.approved{border-left-color:#22c55e !important;background:linear-gradient(135deg,#f0fdf4,#fafaf8)}
.card.seo-card{border-color:rgba(44,142,138,.2)}
.card.pub-card{border-color:rgba(168,85,247,.2)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-badges{display:flex;flex-direction:column;gap:3px}
.type-badge{display:inline-block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:2px 8px;border-radius:4px;align-self:flex-start}
.pillar-tag{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#8c7a68;font-weight:500}
.st-btn{font-size:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;padding:4px 10px;border-radius:12px;cursor:pointer;border:1.5px solid;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:all .15s}
.st-btn:hover{transform:scale(1.05)}
.field-label{font-size:10px;color:#8c7a68;margin-bottom:4px;letter-spacing:.06em;text-transform:uppercase;display:block}
.topic-input{width:100%;padding:9px 11px;border:1.5px solid rgba(201,168,76,.25);border-radius:6px;font-family:inherit;font-size:13px;font-weight:500;color:#1a1205;outline:none;background:#f5f0e8;transition:all .2s}
.topic-input:focus{border-color:#c9a84c;background:#fff;box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.topic-input.seo{border-color:rgba(44,142,138,.3);}
.topic-input.seo:focus{border-color:#2c8e8a;box-shadow:0 0 0 3px rgba(44,142,138,.1)}
.topic-input.pub{border-color:rgba(168,85,247,.3);}
.topic-input.pub:focus{border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,.1)}
.post-textarea{width:100%;min-height:80px;padding:10px 12px;border:1.5px solid rgba(201,168,76,.18);border-radius:6px;font-family:inherit;font-size:12px;color:#1a1205;line-height:1.7;resize:vertical;outline:none;background:#fff;transition:all .2s}
.post-textarea:focus{border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.post-textarea::placeholder{color:#bbb;font-size:11px}
.firma-box{background:#0d0d0d;border-radius:6px;padding:8px 12px;font-size:11px;color:#c9a84c;letter-spacing:.04em;line-height:1.6;user-select:all}
.hashtag-textarea{width:100%;min-height:44px;padding:9px 12px;border:1.5px solid rgba(201,168,76,.18);border-radius:6px;font-family:inherit;font-size:11px;color:#8b6914;line-height:1.6;resize:vertical;outline:none;background:#fff;transition:all .2s}
.hashtag-textarea:focus{border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.hashtag-textarea::placeholder{color:#ccc;font-size:11px}
.link-input{width:100%;padding:9px 11px;border:1.5px solid rgba(201,168,76,.18);border-radius:6px;font-family:inherit;font-size:12px;color:#8c7a68;outline:none;background:#fff;transition:all .2s}
.link-input:focus{border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.link-input::placeholder{color:#ccc}
.link-input.seo:focus{border-color:#2c8e8a;box-shadow:0 0 0 3px rgba(44,142,138,.1)}
.link-input.pub:focus{border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,.1)}
.date-input{width:100%;padding:9px 11px;border:1.5px solid rgba(201,168,76,.18);border-radius:6px;font-family:inherit;font-size:12px;color:#1a1205;outline:none;background:#fff;transition:all .2s}
.date-input:focus{border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.fields-stack{display:flex;flex-direction:column;gap:10px}
.del-btn{font-size:10px;color:#ddd;background:none;border:none;cursor:pointer;font-family:inherit;padding:2px 6px;transition:color .15s;border-radius:4px}
.del-btn:hover{color:#c0392b;background:#fef2f2}

/* ── ADD BUTTON ── */
.add-post-wrap{position:relative;margin-top:12px}
.add-post-btn{display:flex;align-items:center;gap:7px;width:100%;padding:11px 14px;border:1.5px dashed rgba(201,168,76,.35);border-radius:8px;background:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#8b6914;transition:all .2s}
.add-post-btn:hover{background:#f5f0e8;border-color:#c9a84c}
.add-post-btn.seo{border-color:rgba(44,142,138,.35);color:#1a4a48}
.add-post-btn.seo:hover{background:#f0fdfb;border-color:#2c8e8a}
.add-post-btn.pub{border-color:rgba(168,85,247,.35);color:#3a0066}
.add-post-btn.pub:hover{background:#faf5ff;border-color:#a855f7}
.add-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;line-height:1}
.add-icon.rrss{background:#c9a84c;color:#0d0d0d}
.add-icon.seo{background:#2c8e8a;color:#fff}
.add-icon.pub{background:#a855f7;color:#fff}
.dropdown{position:absolute;bottom:calc(100% + 6px);left:0;z-index:200;background:#fff;border:1px solid rgba(201,168,76,.3);border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,.15);min-width:200px;overflow:hidden}
.dd-title{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#8c7a68;padding:10px 14px 7px;border-bottom:1px solid rgba(201,168,76,.15)}
.dd-opt{display:flex;align-items:center;gap:10px;width:100%;padding:10px 16px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;color:#1a1205;text-align:left;transition:background .15s}
.dd-opt:hover{background:#f5f0e8}
.dd-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ── SEO SECTION ── */
.seo-section{display:flex;flex-direction:column;gap:16px}
.seo-month-block{background:#fff;border:1px solid rgba(44,142,138,.25);border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.seo-month-hdr{background:#0d3a38;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.seo-month-title{font-size:13px;font-weight:700;color:#4fd1cd;letter-spacing:.08em;text-transform:uppercase}
.seo-report-row{display:flex;align-items:center;gap:8px}
.seo-report-label{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.seo-report-input{padding:5px 10px;border:1px solid rgba(77,209,205,.3);border-radius:6px;background:rgba(255,255,255,.07);font-family:inherit;font-size:11px;color:#4fd1cd;outline:none;width:200px;transition:all .2s}
.seo-report-input:focus{border-color:#4fd1cd;background:rgba(255,255,255,.12)}
.seo-report-input::placeholder{color:rgba(77,209,205,.3)}
.seo-report-link{font-size:10px;padding:5px 10px;border:1px solid #4fd1cd;border-radius:6px;background:none;color:#4fd1cd;cursor:pointer;font-family:inherit;font-weight:600;letter-spacing:.08em;text-transform:uppercase;transition:all .2s;text-decoration:none;white-space:nowrap}
.seo-report-link:hover{background:rgba(77,209,205,.15)}
.seo-body{padding:14px;display:flex;flex-direction:column;gap:12px}
.seo-card{background:#f8fffe;border:1px solid rgba(44,142,138,.18);border-radius:10px;border-left:4px solid #2c8e8a;padding:13px 14px;display:flex;flex-direction:column;gap:10px;transition:box-shadow .2s}
.seo-card:hover{box-shadow:0 2px 10px rgba(44,142,138,.1)}
.seo-card.approved{border-left-color:#22c55e;background:linear-gradient(135deg,#f0fdf4,#f8fffe)}
.seo-type-badge{display:inline-block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:2px 8px;border-radius:4px;background:#d8f0ee;color:#1a4a48}
.seo-links-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.seo-links-row{grid-template-columns:1fr}}

/* ── PUBLICIDAD SECTION ── */
.pub-section{display:flex;flex-direction:column;gap:16px}
.pub-plan-banner{background:#1a0033;border:1.5px solid rgba(168,85,247,.4);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.pub-plan-icon{font-size:20px}
.pub-plan-info{flex:1}
.pub-plan-title{font-size:12px;font-weight:700;color:#d8b4fe;letter-spacing:.1em;text-transform:uppercase}
.pub-plan-sub{font-size:10px;color:rgba(216,180,254,.5);margin-top:2px}
.pub-plan-input{padding:6px 12px;border:1px solid rgba(168,85,247,.4);border-radius:6px;background:rgba(255,255,255,.07);font-family:inherit;font-size:11px;color:#d8b4fe;outline:none;min-width:180px;flex:1;max-width:280px;transition:all .2s}
.pub-plan-input:focus{border-color:#a855f7;background:rgba(255,255,255,.12)}
.pub-plan-input::placeholder{color:rgba(216,180,254,.3)}
.pub-plan-btn{font-size:10px;padding:6px 12px;border:1px solid #a855f7;border-radius:6px;background:none;color:#d8b4fe;cursor:pointer;font-family:inherit;font-weight:600;letter-spacing:.08em;text-transform:uppercase;transition:all .2s;text-decoration:none;white-space:nowrap}
.pub-plan-btn:hover{background:rgba(168,85,247,.2)}
.pub-month-block{background:#fff;border:1px solid rgba(168,85,247,.2);border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.pub-month-hdr{background:#1a0033;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.pub-month-title{font-size:13px;font-weight:700;color:#d8b4fe;letter-spacing:.08em;text-transform:uppercase}
.pub-report-row{display:flex;align-items:center;gap:8px}
.pub-report-label{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.pub-report-input{padding:5px 10px;border:1px solid rgba(168,85,247,.3);border-radius:6px;background:rgba(255,255,255,.07);font-family:inherit;font-size:11px;color:#d8b4fe;outline:none;width:200px;transition:all .2s}
.pub-report-input:focus{border-color:#a855f7;background:rgba(255,255,255,.12)}
.pub-report-input::placeholder{color:rgba(216,180,254,.3)}
.pub-report-link{font-size:10px;padding:5px 10px;border:1px solid #a855f7;border-radius:6px;background:none;color:#d8b4fe;cursor:pointer;font-family:inherit;font-weight:600;letter-spacing:.08em;text-transform:uppercase;transition:all .2s;text-decoration:none;white-space:nowrap}
.pub-report-link:hover{background:rgba(168,85,247,.15)}
.pub-body{padding:14px;display:flex;flex-direction:column;gap:12px}
.pub-card{background:#fdf8ff;border:1px solid rgba(168,85,247,.15);border-radius:10px;border-left:4px solid #a855f7;padding:13px 14px;display:flex;flex-direction:column;gap:10px;transition:box-shadow .2s}
.pub-card:hover{box-shadow:0 2px 10px rgba(168,85,247,.1)}
.pub-card.approved{border-left-color:#22c55e;background:linear-gradient(135deg,#f0fdf4,#fdf8ff)}
.pub-platform-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;padding:3px 8px;border-radius:4px}
.pub-platform-badge.meta{background:#e8f0fe;color:#1a56db}
.pub-platform-badge.google{background:#fef3dc;color:#8b4513}
.pub-platform-badge.tiktok{background:#f0f0f0;color:#000}
.pub-platform-badge.otras{background:#f5e8ff;color:#6b00cc}
.pub-links-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.pub-links-row{grid-template-columns:1fr}}
.platform-select{width:100%;padding:9px 11px;border:1.5px solid rgba(168,85,247,.25);border-radius:6px;font-family:inherit;font-size:13px;color:#1a1205;outline:none;background:#f8f5ff;transition:all .2s;cursor:pointer}
.platform-select:focus{border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,.1)}

/* ── TOAST ── */
.toast-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;pointer-events:none;display:flex;align-items:center;justify-content:center}
.toast{position:absolute;background:#0d0d0d;color:#ff6eb4;font-family:Poppins,sans-serif;font-size:15px;font-weight:700;padding:14px 28px;border-radius:40px;border:2px solid #ff6eb4;box-shadow:0 8px 40px rgba(255,110,180,.35);white-space:nowrap;letter-spacing:.03em;text-align:center;animation:toastFloat 3s cubic-bezier(.22,.61,.36,1) forwards}
.toast-sub{display:block;font-size:12px;font-weight:600;color:rgba(255,110,180,.7);margin-top:2px;letter-spacing:.06em}
@keyframes toastFloat{
  0%{opacity:0;transform:translateY(40px) scale(.88)}
  12%{opacity:1;transform:translateY(0px) scale(1.04)}
  20%{opacity:1;transform:translateY(0px) scale(1)}
  75%{opacity:1;transform:translateY(-30px) scale(1)}
  100%{opacity:0;transform:translateY(-80px) scale(.94)}
}

/* ── FOOTER ── */
.footer{margin-top:20px;padding:14px 16px;background:#0d0d0d;border-radius:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ft-l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25)}
.ft-r{font-size:11px;color:#ff6eb4;letter-spacing:.08em}

@media(max-width:500px){.hdr-title{font-size:14px}.stat-n{font-size:15px}}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast-container" id="toastContainer"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useRef,useCallback}=React;

// ── SHARED CONSTANTS ───────────────────────────────────────────────────
const MONTHS=[
  {key:'2026-04',name:'Abril',short:'Abr',weeks:['1–7 Abr','8–14 Abr','15–21 Abr','22–30 Abr']},
  {key:'2026-05',name:'Mayo',short:'May',weeks:['1–7 May','8–14 May','15–21 May','22–31 May']},
  {key:'2026-06',name:'Junio',short:'Jun',weeks:['1–7 Jun','8–14 Jun','15–21 Jun','22–30 Jun']},
  {key:'2026-07',name:'Julio',short:'Jul',weeks:['1–7 Jul','8–14 Jul','15–21 Jul','22–31 Jul']},
  {key:'2026-08',name:'Agosto',short:'Ago',weeks:['1–7 Ago','8–14 Ago','15–21 Ago','22–31 Ago']},
  {key:'2026-09',name:'Sep',short:'Sep',weeks:['1–7 Sep','8–14 Sep','15–21 Sep','22–30 Sep']},

  if(!c)return;
  const idx=_toastCount%TOAST_MSGS.length; _toastCount++;
  const[msg,sub]=TOAST_MSGS[idx];
  const el=document.createElement('div');

function buildDefaultRRSS(){
  const s={};
  for(const m of MONTHS){
    s[m.key]=PLAN_RRSS[m.key].map(w=>({
      ig:w.ig.map(c=>({topic:c.topic,text:'',hashtags:DEFAULT_HASHTAGS,link:'',date:'',status:'pendiente'})),
      customIg:[],
    }));
  }
  return s;
}
function loadRRSS(){
  const d=buildDefaultRRSS();
  for(const m of MONTHS){
    const r=lsGet('rrss_'+m.key);
    if(r)d[m.key]=r.map((w,wi)=>({
      ig:(w.ig||[]).map((s,i)=>({topic:s.topic!==undefined?s.topic:(PLAN_RRSS[m.key][wi]?.ig[i]?.topic||''),text:s.text||'',hashtags:s.hashtags||DEFAULT_HASHTAGS,link:s.link||'',date:s.date||'',status:s.status||'pendiente'})),
      customIg:w.customIg||[],
    }));
  }
  return d;
}
function buildDefaultSEO(){
  const s={};
  for(const m of MONTHS) s[m.key]={articles:PLAN_SEO[m.key].map(a=>({...a,notas:'',linkArticulo:'',status:'pendiente'})),reportLink:''};
  return s;
}
function loadSEO(){
  const d=buildDefaultSEO();
  for(const m of MONTHS){const r=lsGet('seo_'+m.key);if(r)d[m.key]=r;}

}

}
function loadPUB(){

}

      for(const m of MONTHS){lsSet('rrss_'+m.key,rrss[m.key]);lsSet('seo_'+m.key,seo[m.key]);lsSet('pub_'+m.key,pub[m.key]);}
      lsSet('pts',pts);
      setSaved(true);
    },800);
  },[rrss,seo,pub,pts]);

    setPts(p=>p+5);
    showToast();
  }

  // ── RRSS handlers
  const updateRRSS=useCallback((mk,wi,plat,pi,f,v)=>{
    setRRSS(prev=>{const n=JSON.parse(JSON.stringify(prev));if(n[mk]?.[wi]?.[plat]?.[pi])n[mk][wi][plat][pi][f]=v;return n;});
  },[]);
  const addCustomRRSS=useCallback((mk,wi,plat,type)=>{
    setRRSS(prev=>{const n=JSON.parse(JSON.stringify(prev));if(!n[mk][wi].customIg)n[mk][wi].customIg=[];n[mk][wi].customIg.push({type,topic:'',text:'',hashtags:DEFAULT_HASHTAGS,link:'',date:'',status:'pendiente'});return n;});
  },[]);
  const updateCustomRRSS=useCallback((mk,wi,plat,ci,f,v)=>{
    setRRSS(prev=>{const n=JSON.parse(JSON.stringify(prev));if(n[mk][wi].customIg?.[ci])n[mk][wi].customIg[ci][f]=v;return n;});
  },[]);
  const deleteCustomRRSS=useCallback((mk,wi,plat,ci)=>{
    setRRSS(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk][wi].customIg.splice(ci,1);return n;});
  },[]);
  const approveRRSS=useCallback((mk,wi,plat,pi,isCustom)=>{
    doApprove();
    setRRSS(prev=>{const n=JSON.parse(JSON.stringify(prev));
      if(isCustom){if(n[mk][wi].customIg?.[pi])n[mk][wi].customIg[pi].status='aprobado';}
      else{if(n[mk][wi][plat]?.[pi])n[mk][wi][plat][pi].status='aprobado';}
      return n;});
  },[pts]);

  // ── SEO handlers
  const updateSEOArticle=useCallback((mk,i,f,v)=>{
    setSEO(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].articles[i][f]=v;return n;});
  },[]);
  const updateSEOReport=useCallback((mk,v)=>{
    setSEO(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].reportLink=v;return n;});
  },[]);
  const addSEOArticle=useCallback((mk)=>{
    setSEO(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].articles.push({title:'',kw:'',type:'Blog',notas:'',linkArticulo:'',date:'',status:'pendiente'});return n;});
  },[]);
  const deleteSEOArticle=useCallback((mk,i)=>{
    setSEO(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].articles.splice(i,1);return n;});
  },[]);
  const approveSEO=useCallback((mk,i)=>{
    doApprove();
    setSEO(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].articles[i].status='aprobado';return n;});
  },[pts]);

  // ── PUB handlers
  const updatePubCampaign=useCallback((mk,i,f,v)=>{
    setPUB(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].campaigns[i][f]=v;return n;});
  },[]);
  const updatePubReport=useCallback((mk,v)=>{
    setPUB(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].reportLink=v;return n;});
  },[]);
  const addPubCampaign=useCallback((mk)=>{
    setPUB(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].campaigns.push({name:'Nueva campaña',platform:'meta',objetivo:'',budget:'',linkCampana:'',reportLink:'',status:'pendiente'});return n;});
  },[]);
  const deletePubCampaign=useCallback((mk,i)=>{
    setPUB(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].campaigns.splice(i,1);return n;});
  },[]);
  const approvePub=useCallback((mk,i)=>{
    doApprove();
    setPUB(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].campaigns[i].status='aprobado';return n;});
  },[pts]);

  // ── STATS
  const mo=MONTHS.find(m=>m.key===month);
  const mDataR=rrss[month]||[];
  const allR=mDataR.flatMap(w=>[...w.ig,...(w.customIg||[])]);
  const aprR=allR.filter(p=>p.status==='aprobado').length;
  const revR=allR.filter(p=>p.status==='revision').length;
  const mDataS=seo[month]||{articles:[]};
  const aprS=mDataS.articles.filter(a=>a.status==='aprobado').length;
  const mDataP=pub[month]||{campaigns:[]};
  const aprP=mDataP.campaigns.filter(c=>c.status==='aprobado').length;
  const pct=section==='rrss'?(allR.length>0?Math.round(aprR/allR.length*100):0):section==='seo'?(mDataS.articles.length>0?Math.round(aprS/mDataS.articles.length*100):0):(mDataP.campaigns.length>0?Math.round(aprP/mDataP.campaigns.length*100):0);

  const tabClass=section==='seo'?'seo-tab':section==='pub'?'pub-tab':'';

  return React.createElement('div',null,
    // HEADER
    React.createElement('div',{className:'hdr'},
      React.createElement('div',{className:'hdr-top'},
        React.createElement('div',{className:'hdr-brand'},
          React.createElement('div',{className:'hdr-eyebrow'},'Docrys & DC · LMNHL'),
          React.createElement('div',{className:'hdr-title'},'Plan Digital 2026')
        ),
        React.createElement('div',{className:'hdr-stats'},
          section==='rrss'&&React.createElement('div',{className:'stat'},React.createElement('div',{className:'stat-n',style:{color:'#4ade80'}},aprR),React.createElement('div',{className:'stat-l'},'Aprob.')),
          section==='rrss'&&React.createElement('div',{className:'stat'},React.createElement('div',{className:'stat-n',style:{color:'#fbbf24'}},revR),React.createElement('div',{className:'stat-l'},'Revisión')),
          section==='seo'&&React.createElement('div',{className:'stat'},React.createElement('div',{className:'stat-n',style:{color:'#4fd1cd'}},aprS),React.createElement('div',{className:'stat-l'},'Art. aprobados')),
          section==='pub'&&React.createElement('div',{className:'stat'},React.createElement('div',{className:'stat-n',style:{color:'#c084fc'}},aprP),React.createElement('div',{className:'stat-l'},'Campañas')),
          React.createElement('div',{className:'pts-badge'},
            React.createElement('span',null,'🏆'),
            React.createElement('div',null,
              React.createElement('div',{className:'pts-n'},pts),
              React.createElement('div',{className:'pts-l'},'pts')
            )
          ),
          React.createElement('span',{className:'save-badge',style:{color:saved?'#4ade80':'#fbbf24'}},saved?'● Guardado':'● Guardando...')
        )
      ),
      // SECTION SWITCHER
      React.createElement('div',{className:'section-switcher'},
        React.createElement('button',{className:'sec-btn '+(section==='rrss'?'on':''),onClick:()=>setSection('rrss')},
          React.createElement('span',{className:'sec-icon'},'📸'),
          'RRSS'
        ),
        React.createElement('button',{className:'sec-btn seo '+(section==='seo'?'on seo':''),onClick:()=>setSection('seo')},
          React.createElement('span',{className:'sec-icon'},'🔍'),
          'SEO'
        ),
        React.createElement('button',{className:'sec-btn pub '+(section==='pub'?'on pub':''),onClick:()=>setSection('pub')},
          React.createElement('span',{className:'sec-icon'},'📣'),
          'Publicidad'
        )
      ),
      // MONTH TABS
      React.createElement('div',{className:'tabs'},
        MONTHS.map(m=>React.createElement('button',{key:m.key,className:'tab '+(m.key===month?'on '+tabClass:'')+' '+tabClass,onClick:()=>setMonth(m.key)},m.short))
      )
    ),
    React.createElement('div',{className:'prog'},React.createElement('div',{className:'prog-bar '+section,style:{width:pct+'%'}})),

    // BODY
    React.createElement('div',{className:'body'},
      React.createElement('div',{className:'mth-hd'},
        React.createElement('div',{className:'mth-accent '+section}),
        React.createElement('div',null,
          React.createElement('div',{className:'mth-name'},mo.name+' 2026'),
          React.createElement('div',{className:'mth-sub'},
            section==='rrss'?pct+'% completado · '+(mo.weeks.length*4)+' posts base':
            section==='seo'?aprS+'/'+mDataS.articles.length+' artículos aprobados':
            aprP+'/'+mDataP.campaigns.length+' campañas aprobadas'
          )
        )
      ),

      // ── RRSS CONTENT
      section==='rrss'&&mo.weeks.map((wl,wi)=>React.createElement(WeekSection,{
        key:wi,mk:month,wi,weekLabel:'Semana '+(wi+1)+' — '+wl,
        planWeek:PLAN_RRSS[month][wi],
        dataWeek:mDataR[wi]||{ig:[],customIg:[]},
        onUpdate:(plat,pi,f,v)=>updateRRSS(month,wi,plat,pi,f,v),
        onAddCustom:(plat,type)=>addCustomRRSS(month,wi,plat,type),
        onUpdateCustom:(plat,ci,f,v)=>updateCustomRRSS(month,wi,plat,ci,f,v),
        onDeleteCustom:(plat,ci)=>deleteCustomRRSS(month,wi,plat,ci),
        onApprove:(plat,pi)=>approveRRSS(month,wi,plat==='custom'?'customIg':plat,pi,plat==='custom'),
        defOpen:wi===0,
      })),

      // ── SEO CONTENT
      section==='seo'&&React.createElement(SEOMonth,{
        mk:month,monthData:mDataS,monthName:mo.name,
        onUpdateArticle:(i,f,v)=>updateSEOArticle(month,i,f,v),
        onUpdateReport:(v)=>updateSEOReport(month,v),
        onAddArticle:()=>addSEOArticle(month),
        onDeleteArticle:(i)=>deleteSEOArticle(month,i),
        onApprove:(i)=>approveSEO(month,i),
      }),

      // ── PUBLICIDAD CONTENT
      section==='pub'&&React.createElement('div',{className:'pub-section'},
        // Plan publicitario global
        React.createElement('div',{className:'pub-plan-banner'},
          React.createElement('span',{className:'pub-plan-icon'},'📋'),
          React.createElement('div',{className:'pub-plan-info'},
            React.createElement('div',{className:'pub-plan-title'},'Plan Publicitario Global'),
            React.createElement('div',{className:'pub-plan-sub'},'Enlace al documento maestro con la estrategia y planificación de publicidad')
          ),
          React.createElement('input',{className:'pub-plan-input',type:'text',value:pubPlanLink,onChange:e=>setPubPlanLink(e.target.value),placeholder:'https://docs.google.com/...'}),
          pubPlanLink&&React.createElement('a',{className:'pub-plan-btn',href:pubPlanLink,target:'_blank',rel:'noopener'},'Abrir plan →')
        ),
        React.createElement(PubMonth,{
          mk:month,monthData:mDataP,monthName:mo.name,
          onUpdateCampaign:(i,f,v)=>updatePubCampaign(month,i,f,v),
          onUpdateReport:(v)=>updatePubReport(month,v),
          onAddCampaign:()=>addPubCampaign(month),
          onDeleteCampaign:(i)=>deletePubCampaign(month,i),
          onApprove:(i)=>approvePub(month,i),
        })
      ),

      React.createElement('div',{className:'footer'},
        React.createElement('span',{className:'ft-l'},'Docrys & DC · Plan Digital Abr–Dic 2026'),
        React.createElement('span',{className:'ft-r'},'🏆 '+pts+' puntos acumulados')
      )
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
